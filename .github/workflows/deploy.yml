name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/dev-learning-platform-gapnss
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行を1つに制限（古いデプロイは取り消す）
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 静的サイトなのでリポジトリ全体をそのまま公開
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
